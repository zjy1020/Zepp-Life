name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/
          cp -r static www/
          cp -r tutorial www/

      - name: Install ImageMagick
        run: sudo apt-get update -q && sudo apt-get install -y -q imagemagick

      - name: Init Capacitor Android
        run: npx cap add android

      - name: Generate app icons
        run: |
          # 1. Generate mipmap densities — icon.png fills each size directly
          for pair in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            res="${pair%%:*}"
            size="${pair##*:}"
            mkdir -p "android/app/src/main/res/mipmap-${res}"
            convert icon.png -resize ${size}x${size}^ -gravity center -extent ${size}x${size} \
              "android/app/src/main/res/mipmap-${res}/ic_launcher.png"
            # Same for round icon
            cp "android/app/src/main/res/mipmap-${res}/ic_launcher.png" \
               "android/app/src/main/res/mipmap-${res}/ic_launcher_round.png"
          done

          # 2. Adaptive icon foreground — icon.png fills full viewport
          convert -size 1024x1024 xc:none \
            \( icon.png -resize 1024x1024^ -gravity center -extent 1024x1024 \) \
            -gravity center -composite android-fg.png
          for pair in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            res="${pair%%:*}"
            size="${pair##*:}"
            convert android-fg.png -resize ${size}x${size} \
              "android/app/src/main/res/mipmap-${res}/ic_launcher_foreground.png"
          done

          # 3. Adaptive icon background — transparent so foreground shows through
          mkdir -p android/app/src/main/res/drawable
          printf '<?xml version="1.0" encoding="utf-8"?>\n<shape xmlns:android="http://schemas.android.com/apk/res/android">\n    <solid android:color="#00000000"/>\n</shape>\n' > android/app/src/main/res/drawable/ic_launcher_background.xml

          # 4. Adaptive icon XML definition
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          printf '<?xml version="1.0" encoding="utf-8"?>\n<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">\n    <background android:drawable="@drawable/ic_launcher_background"/>\n    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>\n</adaptive-icon>\n' > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          cp android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: Copy icon to web assets
        run: cp icon.png www/

      - name: Sync web assets
        run: npx cap sync

      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Y子步数
          path: android/app/build/outputs/apk/debug/*.apk
