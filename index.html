<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Y子步数 - 步数更新</title>
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <div id="app">

    <!-- ===== Header ===== -->
    <header class="app-header">
      <div class="header-left">
        <div class="app-icon">👟</div>
        <div>
          <h1 class="app-title">Y子步数</h1>
          <span class="app-subtitle">步数更新工具</span>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌙</button>
    </header>

    <!-- ===== Tab: 步数 ===== -->
    <div class="tab-panel active" id="tab-steps">

      <!-- 步数显示 -->
      <div class="step-display-card" id="stepDisplay" title="点击手动输入">
        <span class="step-number" id="stepNumber">25,000</span>
        <span class="step-unit">步</span>
        <input type="number" class="step-input hidden" id="stepInput" min="1" max="98800" placeholder="输入步数">
      </div>
      <p class="step-hint" id="stepHint">👆 点击数字手动输入</p>

      <!-- 预设步数 -->
      <div class="preset-row">
        <button type="button" class="preset-btn" data-step="3000">🚶 3K</button>
        <button type="button" class="preset-btn" data-step="8000">👟 8K</button>
        <button type="button" class="preset-btn active" data-step="25000">⚡ 25K</button>
        <button type="button" class="preset-btn" data-step="50000">🔥 50K</button>
        <button type="button" class="preset-btn" data-step="random">🎲 随机</button>
      </div>

      <!-- 滑块 -->
      <div class="slider-container">
        <input type="range" id="stepSlider" min="1" max="98800" value="25000">
        <div class="slider-labels">
          <span>1 步</span>
          <span>50,000</span>
          <span>98,800</span>
        </div>
      </div>

      <!-- 选择账号 -->
      <div class="form-group">
        <label class="form-label">选择账号</label>
        <select id="accountSelect" class="rounded-select">
          <option value="" disabled selected>— 请选择账号 —</option>
        </select>
      </div>

      <!-- 结果横幅 -->
      <div id="resultBanner" class="result-banner hidden">
        <div class="result-icon" id="resultIcon">✓</div>
        <span class="result-msg" id="resultMsg">修改成功！</span>
        <button type="button" class="result-close" onclick="hideResult()">✕</button>
      </div>

      <!-- 提交按钮 -->
      <button type="button" class="submit-btn" id="submitBtn">
        <span class="btn-text">开 始 刷 步</span>
        <span class="btn-icon">→</span>
      </button>

      <!-- 最近记录 -->
      <div class="history-section">
        <div class="history-header">
          <span class="history-title">最近记录</span>
        </div>
        <div id="historyList" class="history-list">
          <p class="history-empty">还没有提交记录</p>
        </div>
      </div>
    </div>

    <!-- ===== Tab: 账号 ===== -->
    <div class="tab-panel" id="tab-accounts">

      <!-- 添加账号 -->
      <div class="add-account-card">
        <input type="text" id="newUser" placeholder="手机号 / 邮箱" autocomplete="off">
        <input type="password" id="newPass" placeholder="密码">
        <button type="button" id="addAccountBtn">+ 添加账号</button>
      </div>

      <!-- 已保存账号 -->
      <div class="account-section">
        <span class="section-title">已保存账号</span>
        <div id="accountList" class="account-list">
          <p class="history-empty">还没有账号，快添加一个吧</p>
        </div>
      </div>
    </div>

    <!-- ===== Tab: 日志 ===== -->
    <div class="tab-panel" id="tab-logs">
      <div class="log-header">
        <span class="section-title">执行日志</span>
        <button type="button" class="clear-btn" id="clearLogBtn">清空</button>
      </div>
      <div class="log-panel">
        <div class="log-content" id="logContent">
          <span class="log-prompt">></span> <span class="log-line">系统就绪，等待执行...</span>
        </div>
      </div>
    </div>

    <!-- ===== Footer ===== -->
    <div style="text-align:center;padding:16px 0 8px;margin-top:auto;">
      <a href="https://github.com/zjy1020" target="_blank" rel="noopener" aria-label="GitHub" style="display:inline-block;color:var(--text-muted);transition:color 0.15s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color=''" onfocus="this.style.color='var(--primary)'" onblur="this.style.color=''">
        <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
    </div>

    <!-- ===== 底部导航 ===== -->
    <nav class="bottom-nav">
      <button type="button" class="nav-item active" data-tab="steps">
        <span class="nav-icon">👟</span>
        <span class="nav-label">步数</span>
      </button>
      <button type="button" class="nav-item" data-tab="accounts">
        <span class="nav-icon">👤</span>
        <span class="nav-label">账号</span>
      </button>
      <button type="button" class="nav-item" data-tab="logs">
        <span class="nav-icon">📋</span>
        <span class="nav-label">日志</span>
      </button>
    </nav>

  </div>

  <script src="static/js/app.js"></script>
</body>
</html>
