<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#E11D48">
  <title>Y子步数 - 步数更新</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Quicksand:wght@400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-left">
        <div class="app-icon">
          <img src="static/images/Y.png" alt="Y" style="width:100%;height:100%;object-fit:cover;display:block;border-radius:inherit;">
        </div>
        <div class="header-copy">
          <div>
            <h1 class="app-title">Y子步数</h1>
            <span class="app-subtitle">步数更新工具</span>
          </div>
          <a href="https://github.com/lby0626" target="_blank" rel="noopener" aria-label="GitHub" class="icon-link">
            <img src="static/images/github-fill.png" alt="GitHub" width="18" height="18">
          </a>
          <a href="https://wwbbt.lanzout.com/i6dYG3vszvcb" target="_blank" rel="noopener" aria-label="下载APK" class="download-link">下载</a>
          <button type="button" id="tutorialBtn" class="tutorial-btn" title="微信步数绑定教学">📖</button>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌙</button>
    </header>

    <div class="tab-panel active" id="tab-steps">
      <div class="status-strip" aria-label="当前状态">
        <div class="stat-card">
          <span class="stat-label">账号</span>
          <strong class="stat-value" id="accountCount">0</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">记录</span>
          <strong class="stat-value" id="historyCount">0</strong>
        </div>
        <div class="stat-card stat-card-wide">
          <span class="stat-label">当前账号</span>
          <strong class="stat-value stat-value-small" id="activeAccountLabel">未选择</strong>
        </div>
      </div>

      <div class="step-display-card" id="stepDisplay" title="点击手动输入">
        <span class="step-number" id="stepNumber">1</span>
        <span class="step-unit">步</span>
        <input type="number" class="step-input hidden" id="stepInput" min="1" max="98800" placeholder="输入步数">
      </div>
      <p class="step-hint" id="stepHint">点击数字手动输入</p>
      <div class="step-range-hint" id="stepRangeHint">当前基准 1，本次最高 1,001</div>

      <div class="step-tools" aria-label="步数快捷操作">
        <button type="button" class="tool-btn tool-btn-primary" id="useLastSuccessBtn">沿用上次成功</button>
        <button type="button" class="tool-btn" id="resetStepBtn">重置为 1</button>
      </div>

      <div class="increment-row" aria-label="推荐加步">
        <button type="button" class="increment-btn" data-adjust="200">+200</button>
        <button type="button" class="increment-btn" data-adjust="500">+500</button>
        <button type="button" class="increment-btn" data-adjust="1000">+1000</button>
      </div>

      <div class="preset-row smart-preset-row">
        <button type="button" class="preset-btn" data-step="baseline" id="baselinePresetBtn">基准 1</button>
        <button type="button" class="preset-btn" data-step="max" id="maxPresetBtn">最高 1,001</button>
        <button type="button" class="preset-btn" data-step="random">随机</button>
      </div>

      <div class="slider-container">
        <input type="range" id="stepSlider" min="1" max="98800" value="1">
        <div class="slider-labels">
          <span id="sliderMinLabel">1 步</span>
          <span id="sliderMidLabel">50,000</span>
          <span id="sliderMaxLabel">98,800</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">选择账号</label>
        <select id="accountSelect" class="rounded-select">
          <option value="" disabled selected>— 请选择账号 —</option>
        </select>
        <div class="account-manage-row" id="accountManageRow" aria-label="当前账号管理">
          <button type="button" class="account-action-btn" id="renameSelectedAccountBtn" data-account-action="rename-selected" onclick="event.stopPropagation(); renameSelectedAccount()" disabled>重命名当前账号</button>
          <button type="button" class="account-action-btn danger" id="deleteSelectedAccountBtn" data-account-action="delete-selected" onclick="event.stopPropagation(); deleteSelectedAccount()" disabled>删除当前账号</button>
        </div>
      </div>

      <div id="resultBanner" class="result-banner hidden" aria-live="polite">
        <div class="result-icon" id="resultIcon">✓</div>
        <span class="result-msg" id="resultMsg">修改成功！</span>
        <button type="button" class="result-close" onclick="hideResult()">✕</button>
      </div>

      <button type="button" class="submit-btn" id="submitBtn">
        <span class="btn-text">开 始 刷 步</span>
        <span class="btn-icon">→</span>
      </button>

      <div class="history-section">
        <div class="history-header">
          <span class="history-title">最近记录</span>
          <button type="button" class="clear-btn" id="clearHistoryBtn">清空记录</button>
        </div>
        <div id="historyList" class="history-list">
          <p class="history-empty">还没有提交记录</p>
        </div>
        <div id="chartContainer" class="chart-container hidden">
          <svg id="stepChart" viewBox="0 0 340 160" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="tab-accounts">
      <div class="add-account-card">
        <div class="add-account-hint">填写你在 Zepp / Zepp Life 注册的账号和密码</div>
        <input type="text" id="newUser" placeholder="手机号 / 邮箱" autocomplete="off">
        <input type="password" id="newPass" placeholder="密码">
        <button type="button" id="addAccountBtn">+ 添加账号</button>
      </div>

      <div class="account-section">
        <span class="section-title">已保存账号</span>
        <div id="accountList" class="account-list">
          <p class="history-empty">还没有账号，快添加一个吧</p>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="tab-logs">
      <div class="log-header">
        <span class="section-title">执行日志</span>
        <button type="button" class="clear-btn" id="clearLogBtn">清空</button>
      </div>
      <div class="log-panel">
        <div class="log-content" id="logContent">
          <div class="log-row"><span class="log-prompt">&gt;</span><span class="log-line">系统就绪，等待执行...</span></div>
        </div>
      </div>
    </div>

    <nav class="bottom-nav">
      <button type="button" class="nav-item active" data-tab="steps" onclick="event.stopPropagation(); setActiveTab('steps')">
        <span class="nav-icon">👟</span>
        <span class="nav-label">步数</span>
      </button>
      <button type="button" class="nav-item" data-tab="accounts" onclick="event.stopPropagation(); setActiveTab('accounts')">
        <span class="nav-icon">👤</span>
        <span class="nav-label">账号</span>
      </button>
      <button type="button" class="nav-item" data-tab="logs" onclick="event.stopPropagation(); setActiveTab('logs')">
        <span class="nav-icon">📋</span>
        <span class="nav-label">日志</span>
      </button>
    </nav>

    <div id="tutorialOverlay" class="modal-overlay hidden">
      <div class="tutorial-modal">
        <div class="tutorial-header">
          <h2>微信步数绑定教学</h2>
          <button type="button" id="tutorialClose" class="tutorial-close">✕</button>
        </div>
        <div class="tutorial-body" id="tutorialBody">
          <p style="text-align:center;color:var(--text-muted);padding:40px 0;">加载中...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="static/js/app.js?v=20260717-account-actions-v2"></script>
</body>
</html>
